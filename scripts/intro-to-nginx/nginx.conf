http {
    include mime.types;

    server {
        listen 8080;
        root scripts/intro-to-nginx/my-site;

        rewrite ^/number/(\w+) /count/$1;

        location ~* /count/[0-9] {
            root scripts/intro-to-nginx/my-site;
            try_files /index.html =404;
        }

        location /fruits {
            root    scripts/intro-to-nginx/my-site;
        }

        location /vegetables {
            root scripts/intro-to-nginx/my-site;
            try_files /vegetables/vegetables.html /index.html =404;
        }

        location /crops {
            return 307 /vegetables;
        }
    }
}

events {}
